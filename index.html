<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WhatsUp — Start online. Meet in person.</title>
  <meta name="theme-color" content="#00adef" />
  <link rel="icon" type="image/svg+xml" href="img/logo.svg" />
  <link rel="apple-touch-icon" href="img/apple-touch-icon.png" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
</head>
<body>
  <div class="desktop-bg">
    <div class="desktop-pitch">
      <div class="pitch-logo">whats<span>up</span></div>
      <p class="pitch-line">Start online. Meet in person.</p>
      <p class="pitch-sub">See who's open to meeting within 100 yards. Tap. Bump phones. Put yours away.</p>
    </div>

    <div class="phone">
      <div class="phone-notch"></div>
      <div class="app" id="app">
        <!-- Screen content rendered by app.js -->
        <main class="screen" id="screen"></main>

        <!-- Bottom tab bar -->
        <nav class="tabbar" id="tabbar">
          <button class="tab" data-tab="here" aria-label="Here">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M12 2a1 1 0 0 1 1 1v2.07A7 7 0 0 1 18.93 11H21a1 1 0 1 1 0 2h-2.07A7 7 0 0 1 13 18.93V21a1 1 0 1 1-2 0v-2.07A7 7 0 0 1 5.07 13H3a1 1 0 1 1 0-2h2.07A7 7 0 0 1 11 5.07V3a1 1 0 0 1 1-1Zm0 5a5 5 0 1 0 0 10 5 5 0 0 0 0-10Z"/></svg>
            <span>Here</span>
          </button>
          <button class="tab" data-tab="map" aria-label="Map">
            <svg viewBox="0 0 24 24"><path d="M12 2a7 7 0 0 1 7 7c0 4.5-5.2 10.4-6.6 11.9a.55.55 0 0 1-.8 0C10.2 19.4 5 13.5 5 9a7 7 0 0 1 7-7Zm0 4.4A2.6 2.6 0 1 0 12 11.6 2.6 2.6 0 0 0 12 6.4Z"/></svg>
            <span>Map</span>
          </button>
          <button class="tab" data-tab="chats" aria-label="Chats">
            <svg viewBox="0 0 24 24"><path d="M4 5h16a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H9l-4.2 3.5A.6.6 0 0 1 4 20V6a1 1 0 0 1 0-1Z"/></svg>
            <span>Chats</span>
            <em class="tab-badge" id="msg-badge">2</em>
          </button>
          <button class="tab" data-tab="you" aria-label="You">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20.5c.8-3.8 4.1-6 8-6s7.2 2.2 8 6a.7.7 0 0 1-.7.8H4.7a.7.7 0 0 1-.7-.8Z"/></svg>
            <span>You</span>
          </button>
        </nav>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=2"></script>
  <script src="js/app.js?v=2"></script>
</body>
</html>
